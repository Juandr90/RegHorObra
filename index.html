<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de jornada &middot; Parte de horas</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#20242A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parte de horas">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root{
    --paper:#EDEAE3;
    --ink:#20242A;
    --ink-soft:#4B525C;
    --line:#C9C2B2;
    --yellow:#F2B705;
    --yellow-ink:#3A2C00;
    --blue:#2E4A6B;
    --blue-soft:#5D7A9C;
    --rust:#B3401D;
    --green:#3B7A57;
    --white:#FAF9F5;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Archivo',sans-serif;
    color:var(--ink);
    background:
      linear-gradient(var(--line) 1px, transparent 1px) 0 0/100% 28px,
      var(--paper);
    background-attachment:local;
    min-height:100vh;
  }
  .app{max-width:880px;margin:0 auto;padding:0 0 60px;}

  /* header */
  .topbar{
    background:var(--ink);
    color:var(--white);
    padding:22px 24px 20px;
    border-bottom:6px solid var(--yellow);
  }
  .topbar .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--yellow);
    margin:0 0 4px;
  }
  .topbar h1{
    font-family:'Archivo Black',sans-serif;
    font-size:26px;
    margin:0;
    letter-spacing:.01em;
  }
  .topbar .who{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:#C9CED6;
    margin-top:6px;
  }

  /* nav */
  .nav{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:0;
    background:var(--white);
    border-bottom:2px solid var(--ink);
    position:sticky; top:0; z-index:10;
  }
  .nav button{
    font-family:'Archivo',sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:.02em;
    padding:14px 6px;
    border:none;
    border-right:1px solid var(--line);
    background:var(--white);
    color:var(--ink-soft);
    cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .nav button:last-child{border-right:none;}
  .nav button .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    opacity:.55;
  }
  .nav button.active{
    background:var(--ink);
    color:var(--white);
  }
  .nav button.active .tag{color:var(--yellow);opacity:1;}

  .view{padding:26px 24px 10px;}

  .card{
    background:var(--white);
    border:1px solid var(--line);
    box-shadow:3px 3px 0 rgba(32,36,42,.08);
    padding:22px;
    margin-bottom:20px;
  }
  .card h2{
    font-family:'Archivo Black',sans-serif;
    font-size:17px;
    margin:0 0 4px;
  }
  .card .sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    margin:0 0 18px;
  }

  label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink-soft);
    margin-bottom:5px;
  }
  input[type=text], input[type=date], input[type=time], textarea, select{
    width:100%;
    height:42px;
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    padding:0 10px;
    border:1.5px solid var(--ink);
    background:var(--white);
    color:var(--ink);
  }
  input[type=date]{
    /* native date control can report a wider intrinsic size than text
       inputs in some browsers; lock it to the same box as its siblings */
    min-width:0;
  }
  textarea{font-family:'Archivo',sans-serif; resize:vertical; min-height:56px; height:auto; padding:9px 10px;}
  input:focus, textarea:focus, select:focus{outline:3px solid var(--yellow); outline-offset:0;}

  .row{display:grid; gap:14px; margin-bottom:14px;}
  .row.c2{grid-template-columns:1fr 1fr;}
  .row.c4{grid-template-columns:repeat(4,1fr);}
  .row > div{min-width:0;}

  .shift-block{
    border-left:3px solid var(--blue);
    padding-left:14px;
    margin-bottom:16px;
  }
  .shift-block .shift-title{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--blue);
    text-transform:uppercase;
    letter-spacing:.08em;
    margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .toggle-shift{
    background:none;border:1px solid var(--blue-soft);color:var(--blue);
    font-family:'IBM Plex Mono',monospace;font-size:10px;
    padding:3px 8px;cursor:pointer;
  }

  .jornada-preview{
    font-family:'IBM Plex Mono',monospace;
    background:var(--ink);
    color:var(--yellow);
    padding:12px 14px;
    font-size:20px;
    font-weight:700;
    display:flex;justify-content:space-between;align-items:center;
    margin:16px 0;
  }
  .jornada-preview .lbl{font-size:11px;color:#C9CED6;font-weight:400;text-transform:uppercase;letter-spacing:.08em;}

  .btn{
    font-family:'Archivo',sans-serif;
    font-weight:700;
    font-size:14px;
    padding:13px 20px;
    border:none;
    cursor:pointer;
    letter-spacing:.02em;
  }
  .btn-primary{background:var(--yellow); color:var(--yellow-ink);}
  .btn-primary:hover{background:#ffc626;}
  .btn-secondary{background:var(--white); color:var(--ink); border:1.5px solid var(--ink);}
  .btn-secondary:hover{background:var(--paper);}
  .btn-danger{background:var(--white); color:var(--rust); border:1.5px solid var(--rust); font-size:12px; padding:6px 10px;}
  .btn-block{width:100%;}

  /* stamp */
  .stamp-wrap{display:flex;justify-content:center;padding:20px 0 4px;}
  .stamp{
    font-family:'Archivo Black',sans-serif;
    color:var(--rust);
    border:4px solid var(--rust);
    border-radius:8px;
    padding:10px 22px;
    transform:rotate(-6deg);
    text-align:center;
    opacity:0;
    animation:stampIn .35s ease-out forwards;
  }
  .stamp .l1{font-size:20px;letter-spacing:.05em;}
  .stamp .l2{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;margin-top:2px;}
  @keyframes stampIn{
    0%{opacity:0; transform:rotate(-6deg) scale(1.6);}
    60%{opacity:1;}
    100%{opacity:1; transform:rotate(-6deg) scale(1);}
  }

  /* table (consultar) */
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px; text-transform:uppercase; letter-spacing:.06em;
    text-align:left; padding:8px 8px; background:var(--ink); color:var(--white);
    position:sticky; top:0;
  }
  td{padding:9px 8px; border-bottom:1px solid var(--line); vertical-align:top;}
  tr:nth-child(even) td{background:#F5F3EE;}
  .obs-cell{max-width:220px; color:var(--ink-soft); font-size:12.5px;}
  .empty-state{
    text-align:center; padding:50px 20px; color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace; font-size:13px;
  }
  .table-scroll{overflow-x:auto; border:1px solid var(--line);}
  .row-actions{display:flex; gap:6px;}

  .stat-strip{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px;}
  .stat{background:var(--white); border:1px solid var(--line); padding:14px; text-align:center;}
  .stat .n{font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:700; color:var(--blue);}
  .stat .l{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-top:2px;}

  .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--white); padding:12px 20px;
    font-family:'IBM Plex Mono',monospace; font-size:13px;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
    opacity:0; transition:opacity .25s;
    z-index:100; border-left:4px solid var(--yellow);
  }
  .toast.show{opacity:1;}

  @media (max-width:600px){
    .row.c2, .row.c4{grid-template-columns:1fr 1fr;}
    .nav button span.label{font-size:11px;}
    .stat-strip{grid-template-columns:1fr;}
  }
</style>

</head>
<body>
<div class="app">
  <div class="topbar">
    <p class="eyebrow">Parte de horas &middot; Obra</p>
    <h1>Control de jornada</h1>
    <div class="who" id="who-line">Juan Durán Ramallo</div>
  </div>

  <div class="nav">
    <button data-view="hoy" class="active"><span class="label">Fichar hoy</span><span class="tag">01</span></button>
    <button data-view="otro"><span class="label">Otra fecha</span><span class="tag">02</span></button>
    <button data-view="consultar"><span class="label">Consultar</span><span class="tag">03</span></button>
    <button data-view="exportar"><span class="label">Exportar Excel</span><span class="tag">04</span></button>
  </div>

  <div class="view" id="view-root"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'fichajes:entries';
let entries = [];
let currentView = 'hoy';
let showSecondShiftHoy = false;
let showSecondShiftOtro = false;

function pad(n){ return String(n).padStart(2,'0'); }
function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function isoToSpanish(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function timeToMinutes(t){
  if(!t) return null;
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}
function minutesToHM(total){
  if(total==null || isNaN(total)) return {h:0,m:0};
  const h = Math.floor(total/60);
  const m = total%60;
  return {h,m};
}

async function loadEntries(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : [];
  }catch(e){
    entries = [];
  }
}
async function persistEntries(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    return true;
  }catch(e){
    console.error('Error guardando', e);
    return false;
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function calcJornada(entradaM, salidaM, entradaT, salidaT){
  let total = 0;
  const eM = timeToMinutes(entradaM), sM = timeToMinutes(salidaM);
  if(eM!=null && sM!=null && sM>eM) total += (sM-eM);
  const eT = timeToMinutes(entradaT), sT = timeToMinutes(salidaT);
  if(eT!=null && sT!=null && sT>eT) total += (sT-eT);
  return minutesToHM(total);
}

function switchView(v){
  currentView = v;
  document.querySelectorAll('.nav button').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===v);
  });
  render();
}

function formTemplate(mode){
  // mode: 'hoy' -> date locked to today; 'otro' -> date editable
  const dateVal = mode==='hoy' ? todayISO() : (window._otroFecha || todayISO());
  const dateAttrs = mode==='hoy' ? 'readonly' : '';
  const showSecond = mode==='hoy' ? showSecondShiftHoy : showSecondShiftOtro;

  return `
  <div class="card">
    <h2>${mode==='hoy' ? 'Fichar hoy' : 'Fichar con fecha distinta'}</h2>
    <p class="sub">${mode==='hoy' ? 'Se registra automáticamente en la fecha de hoy.' : 'Elige el día que quieres registrar.'}</p>

    <div class="row c2">
      <div>
        <label>Día</label>
        <input type="date" id="f-fecha" value="${dateVal}" ${dateAttrs}>
      </div>
      <div>
        <label>Obra</label>
        <input type="text" id="f-obra" placeholder="Nombre de la obra">
      </div>
    </div>

    <div class="shift-block">
      <div class="shift-title"><span>Turno mañana</span></div>
      <div class="row c2">
        <div><label>Entrada</label><input type="time" id="f-entradaM"></div>
        <div><label>Salida</label><input type="time" id="f-salidaM"></div>
      </div>
    </div>

    <div class="shift-block" id="shift-tarde-wrap" style="${showSecond?'':'display:none;'}">
      <div class="shift-title"><span>Turno tarde</span></div>
      <div class="row c2">
        <div><label>Entrada</label><input type="time" id="f-entradaT"></div>
        <div><label>Salida</label><input type="time" id="f-salidaT"></div>
      </div>
    </div>
    <button class="toggle-shift" id="btn-toggle-shift">${showSecond ? '– quitar segundo turno' : '+ añadir segundo turno'}</button>

    <div class="jornada-preview">
      <span class="lbl">Jornada total</span>
      <span id="jornada-out">0h 00m</span>
    </div>

    <div class="row c2">
      <div>
        <label>Trabajador (Grupo/GB)</label>
        <input type="text" id="f-trabajador" value="Juan Durán Ramallo">
      </div>
      <div>
        <label>Subcontrata</label>
        <input type="text" id="f-subcontrata" placeholder="(opcional)">
      </div>
    </div>

    <div class="row" style="margin-bottom:14px;">
      <div>
        <label>Partidas</label>
        <input type="text" id="f-partidas" placeholder="(opcional)">
      </div>
    </div>

    <div class="row" style="margin-bottom:6px;">
      <div>
        <label>Observaciones</label>
        <textarea id="f-observaciones" placeholder="Qué se ha hecho hoy..."></textarea>
      </div>
    </div>

    <button class="btn btn-primary btn-block" id="btn-fichar">Fichar</button>
    <div class="stamp-wrap" id="stamp-wrap"></div>
  </div>`;
}

function attachFormHandlers(mode){
  const entradaM = document.getElementById('f-entradaM');
  const salidaM = document.getElementById('f-salidaM');
  const entradaT = document.getElementById('f-entradaT');
  const salidaT = document.getElementById('f-salidaT');
  const jornadaOut = document.getElementById('jornada-out');
  const toggleBtn = document.getElementById('btn-toggle-shift');
  const fechaInput = document.getElementById('f-fecha');

  function updateJornada(){
    const r = calcJornada(entradaM.value, salidaM.value,
      entradaT ? entradaT.value : null, salidaT ? salidaT.value : null);
    jornadaOut.textContent = `${r.h}h ${pad(r.m)}m`;
  }
  [entradaM, salidaM, entradaT, salidaT].forEach(el=>{
    if(el) el.addEventListener('input', updateJornada);
  });
  updateJornada();

  if(fechaInput && mode==='otro'){
    fechaInput.addEventListener('input', ()=>{ window._otroFecha = fechaInput.value; });
  }

  toggleBtn.addEventListener('click', ()=>{
    if(mode==='hoy') showSecondShiftHoy = !showSecondShiftHoy;
    else showSecondShiftOtro = !showSecondShiftOtro;
    render();
  });

  document.getElementById('btn-fichar').addEventListener('click', async ()=>{
    const fecha = document.getElementById('f-fecha').value;
    const obra = document.getElementById('f-obra').value.trim();
    if(!fecha){ showToast('Falta la fecha'); return; }
    if(!obra){ showToast('Falta el nombre de la obra'); return; }
    if(!entradaM.value || !salidaM.value){ showToast('Falta la hora de entrada o salida'); return; }

    const r = calcJornada(entradaM.value, salidaM.value,
      entradaT ? entradaT.value : null, salidaT ? salidaT.value : null);

    const entry = {
      id: Date.now(),
      fecha,
      obra,
      entradaM: entradaM.value, salidaM: salidaM.value,
      entradaT: entradaT ? entradaT.value : '', salidaT: salidaT ? salidaT.value : '',
      horas: r.h, minutos: r.m,
      trabajador: document.getElementById('f-trabajador').value.trim() || 'Juan Durán Ramallo',
      subcontrata: document.getElementById('f-subcontrata').value.trim(),
      partidas: document.getElementById('f-partidas').value.trim(),
      observaciones: document.getElementById('f-observaciones').value.trim()
    };

    entries.push(entry);
    const ok = await persistEntries();
    if(ok){
      const stampWrap = document.getElementById('stamp-wrap');
      stampWrap.innerHTML = `<div class="stamp"><div class="l1">FICHADO</div><div class="l2">${isoToSpanish(fecha)} · ${r.h}h ${pad(r.m)}m</div></div>`;
      showToast('Jornada guardada correctamente');
      // reset relevant fields but keep worker name
      ['f-obra','f-entradaM','f-salidaM','f-entradaT','f-salidaT','f-subcontrata','f-partidas','f-observaciones'].forEach(id=>{
        const el = document.getElementById(id);
        if(el) el.value = '';
      });
      updateJornada();
    }else{
      showToast('No se pudo guardar. Inténtalo de nuevo.');
    }
  });
}

function consultarTemplate(){
  if(entries.length===0){
    return `<div class="card"><div class="empty-state">Todavía no hay jornadas registradas.<br>Ficha tu primer día desde "Fichar hoy".</div></div>`;
  }
  const sorted = [...entries].sort((a,b)=> a.fecha < b.fecha ? 1 : -1);
  const totalMin = entries.reduce((acc,e)=> acc + e.horas*60 + e.minutos, 0);
  const totalHM = minutesToHM(totalMin);
  const obras = new Set(entries.map(e=>e.obra)).size;

  const rows = sorted.map(e=>`
    <tr>
      <td>${isoToSpanish(e.fecha)}</td>
      <td>${e.obra}</td>
      <td>${e.entradaM || '–'}</td>
      <td>${e.salidaM || '–'}</td>
      <td>${e.entradaT || '–'}</td>
      <td>${e.salidaT || '–'}</td>
      <td>${e.horas}h ${pad(e.minutos)}m</td>
      <td>${e.trabajador}</td>
      <td>${e.subcontrata||'–'}</td>
      <td class="obs-cell">${e.observaciones||'–'}</td>
      <td class="row-actions"><button class="btn-danger" data-del="${e.id}">Borrar</button></td>
    </tr>`).join('');

  return `
  <div class="stat-strip">
    <div class="stat"><div class="n">${entries.length}</div><div class="l">Jornadas</div></div>
    <div class="stat"><div class="n">${totalHM.h}h ${pad(totalHM.m)}m</div><div class="l">Horas totales</div></div>
    <div class="stat"><div class="n">${obras}</div><div class="l">Obras distintas</div></div>
  </div>
  <div class="card">
    <h2>Consultar jornadas</h2>
    <p class="sub">${entries.length} registro(s), más reciente primero.</p>
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th>Día</th><th>Obra</th><th>Ent. mañana</th><th>Sal. mañana</th>
          <th>Ent. tarde</th><th>Sal. tarde</th><th>Jornada</th>
          <th>Trabajador</th><th>Subcontrata</th><th>Observaciones</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function exportarTemplate(){
  return `
  <div class="card">
    <h2>Exportar a Excel</h2>
    <p class="sub">Genera un archivo .xlsx con la misma estructura que el parte de horas original (Horario, Jornada, Trabajadores, Partidas).</p>
    <div class="stat-strip">
      <div class="stat"><div class="n">${entries.length}</div><div class="l">Filas a exportar</div></div>
    </div>
    <button class="btn btn-primary btn-block" id="btn-exportar" ${entries.length===0?'disabled':''}>Descargar Excel</button>
    ${entries.length===0 ? '<p class="sub" style="margin-top:12px;">Ficha al menos una jornada antes de exportar.</p>' : ''}
  </div>`;
}

function buildWorkbook(){
  const aoa = [];
  aoa.push(['','','Horario','','','','','','','','Jornada','','Trabajadores','','Partidas','']);
  aoa.push(['Dia','Obra','Entrada','','Salida','','Entrada','','Salida','','Horas','Minutos','Grupo/GB','Subcontrata','','Observaciones']);

  const sorted = [...entries].sort((a,b)=> a.fecha < b.fecha ? -1 : 1);
  sorted.forEach(e=>{
    const [eh,em] = (e.entradaM||'0:0').split(':').map(Number);
    const [sh,sm] = (e.salidaM||'0:0').split(':').map(Number);
    const entradaT = e.entradaT ? e.entradaT.split(':').map(Number) : ['',''];
    const salidaT = e.salidaT ? e.salidaT.split(':').map(Number) : ['',''];
    aoa.push([
      isoToSpanish(e.fecha), e.obra,
      eh, em, sh, sm,
      entradaT[0], entradaT[1], salidaT[0], salidaT[1],
      e.horas, e.minutos,
      e.trabajador, e.subcontrata||'', '', e.observaciones||''
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges'] = [
    {s:{r:0,c:2}, e:{r:0,c:9}},   // Horario
    {s:{r:0,c:10}, e:{r:0,c:11}}, // Jornada
    {s:{r:0,c:12}, e:{r:0,c:13}}, // Trabajadores
    {s:{r:0,c:14}, e:{r:0,c:15}}, // Partidas
    {s:{r:1,c:2}, e:{r:1,c:3}},   // Entrada manana
    {s:{r:1,c:4}, e:{r:1,c:5}},   // Salida manana
    {s:{r:1,c:6}, e:{r:1,c:7}},   // Entrada tarde
    {s:{r:1,c:8}, e:{r:1,c:9}},   // Salida tarde
  ];
  ws['!cols'] = [
    {wch:11},{wch:16},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},
    {wch:7},{wch:8},{wch:20},{wch:14},{wch:9},{wch:38}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Hoja1');
  return wb;
}

function render(){
  const root = document.getElementById('view-root');
  if(currentView==='hoy'){
    root.innerHTML = formTemplate('hoy');
    attachFormHandlers('hoy');
  }else if(currentView==='otro'){
    root.innerHTML = formTemplate('otro');
    attachFormHandlers('otro');
  }else if(currentView==='consultar'){
    root.innerHTML = consultarTemplate();
    root.querySelectorAll('[data-del]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id = Number(btn.dataset.del);
        entries = entries.filter(e=>e.id!==id);
        await persistEntries();
        showToast('Registro borrado');
        render();
      });
    });
  }else if(currentView==='exportar'){
    root.innerHTML = exportarTemplate();
    const btn = document.getElementById('btn-exportar');
    if(btn){
      btn.addEventListener('click', ()=>{
        try{
          const wb = buildWorkbook();
          const fecha = todayISO();
          XLSX.writeFile(wb, `parte_horas_${fecha}.xlsx`);
          showToast('Excel descargado');
        }catch(e){
          console.error(e);
          showToast('Error al generar el Excel');
        }
      });
    }
  }
}

document.querySelectorAll('.nav button').forEach(b=>{
  b.addEventListener('click', ()=>switchView(b.dataset.view));
});

(async function init(){
  await loadEntries();
  render();
})();
</script>
</body>
</html>
